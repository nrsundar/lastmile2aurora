    <rect x="352" y="170" width="196" height="4" rx="2" fill="url(#headerOracle)"/>
  </g>
  <text x="450" y="206" text-anchor="middle" font-size="17" font-weight="700" fill="#fbbf24">Oracle EE 19c</text>
  <text x="450" y="228" text-anchor="middle" font-size="12" fill="#d6dde8">Source database</text>
  <text x="450" y="254" text-anchor="middle" font-size="12" fill="#8b94a6" font-family="'JetBrains Mono', monospace">V$SQL · V$SESSTAT</text>
  <text x="450" y="274" text-anchor="middle" font-size="12" fill="#8b94a6">elapsed_time · disk_reads</text>
  <text x="450" y="298" text-anchor="middle" font-size="11" fill="#6a7285">Encrypted · KMS CMK</text>

  <!-- Aurora PG 16 -->
  <g filter="url(#card-shadow)">
    <rect x="352" y="334" width="196" height="146" rx="10" fill="#0f1628" stroke="#2a3244"/>
    <rect x="352" y="334" width="196" height="4" rx="2" fill="url(#headerAurora)"/>
  </g>
  <text x="450" y="370" text-anchor="middle" font-size="17" font-weight="700" fill="#60a5fa">Aurora PostgreSQL 16</text>
  <text x="450" y="392" text-anchor="middle" font-size="12" fill="#d6dde8">Target database</text>
  <text x="450" y="418" text-anchor="middle" font-size="12" fill="#8b94a6" font-family="'JetBrains Mono', monospace">pg_stat_statements</text>
