  <text x="800" y="170" text-anchor="middle" font-size="17" font-weight="700" fill="#0a0f1d">LastMile2Aurora · ECS Fargate</text>
  <text x="800" y="205" text-anchor="middle" font-size="11" fill="#6a7285" letter-spacing="0.08em">FASTAPI · PYTHON 3.11 · BEHIND ALB + CLOUDFRONT</text>

