    <text x="728" y="362" text-anchor="middle" font-size="11" fill="#8b94a6">Schema-aware</text>
  </g>
  <g>
    <rect x="804" y="300" width="136" height="72" rx="7" fill="#141c34" stroke="#2a3244"/>
