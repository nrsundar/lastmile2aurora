<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, 'Segoe UI', 'Amazon Ember', sans-serif">
  <defs>
    <!-- Subtle inner glows for cards (Aurora Dark) -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0" flood-color="#060912" flood-opacity="1"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="headerOracle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="headerAurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="headerEngine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="headerDash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arrowAurora" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowOracle" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowMint" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#5eead4"/>
    </marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6b7685"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="540" rx="14" fill="#0a0f1d"/>

  <!-- Title -->
  <text x="32" y="40" font-size="17" font-weight="700" fill="#f4f7fb" letter-spacing="-0.01em">LastMile2Aurora · Architecture</text>
  <text x="32" y="58" font-size="11" fill="#8b94a6" letter-spacing="0.04em">Oracle → Aurora PostgreSQL migration performance watchdog</text>
  <line x1="32" y1="70" x2="928" y2="70" stroke="#1f2838" stroke-width="1"/>

  <!-- =========================================================================
       COLUMN LABELS
       ========================================================================= -->
  <text x="100" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#6a7285" letter-spacing="0.2em">SOURCES</text>
  <text x="360" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#6a7285" letter-spacing="0.2em">DATABASES</text>
  <text x="640" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#6a7285" letter-spacing="0.2em">WATCHDOG ENGINE</text>
  <text x="870" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#6a7285" letter-spacing="0.2em">UI</text>

  <!-- =========================================================================
       SOURCES COLUMN
       ========================================================================= -->
  <!-- Customer App -->
  <g filter="url(#card-shadow)">
    <rect x="32" y="110" width="160" height="78" rx="8" fill="#0f1628" stroke="#2a3244" stroke-width="1"/>
    <rect x="32" y="110" width="160" height="3" rx="1.5" fill="url(#headerDash)"/>
  </g>
  <text x="112" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#f4f7fb">Customer Application</text>
  <text x="112" y="154" text-anchor="middle" font-size="10" fill="#8b94a6">Tagged SQL queries</text>
  <text x="112" y="172" text-anchor="middle" font-size="9.5" fill="#a78bfa" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">/* tag:order_lookup */</text>

  <!-- HammerDB -->
  <g filter="url(#card-shadow)">
    <rect x="32" y="208" width="160" height="72" rx="8" fill="#0f1628" stroke="#2a3244" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="32" y="208" width="160" height="3" rx="1.5" fill="#6a7285"/>
  </g>
  <text x="112" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#d6dde8">HammerDB <tspan fill="#6a7285" font-size="10" font-weight="400">(demo)</tspan></text>
  <text x="112" y="250" text-anchor="middle" font-size="10" fill="#8b94a6">TPC-C load generator</text>
  <text x="112" y="266" text-anchor="middle" font-size="9" fill="#6a7285">Small / Medium / Large</text>

  <!-- =========================================================================
       DATABASES COLUMN (VPC boundary)
       ========================================================================= -->
  <g>
    <rect x="260" y="110" width="200" height="280" rx="10" fill="none" stroke="#1f2838" stroke-width="1" stroke-dasharray="5 4"/>
    <rect x="268" y="102" width="68" height="16" rx="2" fill="#0a0f1d"/>
    <text x="302" y="113" text-anchor="middle" font-size="9" fill="#6a7285" letter-spacing="0.12em">VPC · PRIVATE</text>
  </g>

  <!-- Oracle EE 19c -->
  <g filter="url(#card-shadow)">
    <rect x="280" y="135" width="160" height="110" rx="8" fill="#0f1628" stroke="#2a3244" stroke-width="1"/>
    <rect x="280" y="135" width="160" height="3" rx="1.5" fill="url(#headerOracle)"/>
  </g>
  <!-- simple cylinder icon -->
  <g transform="translate(300, 160)">
    <ellipse cx="10" cy="4" rx="10" ry="3.5" fill="#fbbf24" opacity="0.9"/>
    <rect x="0" y="4" width="20" height="18" fill="#fbbf24" opacity="0.9"/>
    <ellipse cx="10" cy="22" rx="10" ry="3.5" fill="#d97706"/>
  </g>
  <text x="360" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">Oracle EE 19c</text>
  <text x="360" y="190" text-anchor="middle" font-size="10" fill="#d6dde8">Source database</text>
  <text x="360" y="207" text-anchor="middle" font-size="9" fill="#8b94a6" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">V$SQL · V$SESSTAT</text>
  <text x="360" y="221" text-anchor="middle" font-size="9" fill="#8b94a6">elapsed_time · disk_reads</text>
  <text x="360" y="235" text-anchor="middle" font-size="9" fill="#6a7285">Encrypted · KMS CMK</text>

  <!-- Aurora PG 16 -->
  <g filter="url(#card-shadow)">
    <rect x="280" y="265" width="160" height="110" rx="8" fill="#0f1628" stroke="#2a3244" stroke-width="1"/>
    <rect x="280" y="265" width="160" height="3" rx="1.5" fill="url(#headerAurora)"/>
  </g>
  <g transform="translate(300, 290)">
    <ellipse cx="10" cy="4" rx="10" ry="3.5" fill="#60a5fa" opacity="0.9"/>
    <rect x="0" y="4" width="20" height="18" fill="#60a5fa" opacity="0.9"/>
    <ellipse cx="10" cy="22" rx="10" ry="3.5" fill="#2563eb"/>
  </g>
  <text x="360" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">Aurora PostgreSQL 16</text>
  <text x="360" y="320" text-anchor="middle" font-size="10" fill="#d6dde8">Target database</text>
  <text x="360" y="337" text-anchor="middle" font-size="9" fill="#8b94a6" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">pg_stat_statements</text>
  <text x="360" y="351" text-anchor="middle" font-size="9" fill="#8b94a6">EXPLAIN ANALYZE · BUFFERS</text>
  <text x="360" y="365" text-anchor="middle" font-size="9" fill="#6a7285">Encrypted · KMS CMK</text>

  <!-- =========================================================================
       ENGINE COLUMN (ECS Fargate)
       ========================================================================= -->
  <g filter="url(#card-shadow)">
    <rect x="510" y="110" width="260" height="280" rx="10" fill="#0f1628" stroke="#2a3244" stroke-width="1"/>
    <rect x="510" y="110" width="260" height="32" rx="10 10 0 0" fill="url(#headerEngine)"/>
    <rect x="510" y="128" width="260" height="14" fill="url(#headerEngine)"/>
  </g>
  <text x="640" y="131" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0f1d">LastMile2Aurora · ECS Fargate</text>
  <text x="640" y="155" text-anchor="middle" font-size="9" fill="#6a7285" letter-spacing="0.08em">FASTAPI · PYTHON 3.11 · BEHIND ALB + CLOUDFRONT</text>

  <!-- Engine sub-components grid 2x2 then a wide row -->
  <g>
    <rect x="526" y="170" width="110" height="54" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="581" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#5eead4">Tag Matcher</text>
    <text x="581" y="206" text-anchor="middle" font-size="9" fill="#8b94a6">Parses /* tag:… */</text>
    <text x="581" y="218" text-anchor="middle" font-size="9" fill="#8b94a6">Oracle ↔ PG pairing</text>
  </g>
  <g>
    <rect x="644" y="170" width="110" height="54" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="699" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa">Perf Compare</text>
    <text x="699" y="206" text-anchor="middle" font-size="9" fill="#8b94a6">Blocks vs pages</text>
    <text x="699" y="218" text-anchor="middle" font-size="9" fill="#8b94a6">Engine-only time</text>
  </g>
  <g>
    <rect x="526" y="234" width="110" height="54" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="581" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">Deep Diff</text>
    <text x="581" y="270" text-anchor="middle" font-size="9" fill="#8b94a6">Row-set equality</text>
    <text x="581" y="282" text-anchor="middle" font-size="9" fill="#8b94a6">Schema-aware</text>
  </g>
  <g>
    <rect x="644" y="234" width="110" height="54" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="699" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#fb7185">LLM Rewrite</text>
    <text x="699" y="270" text-anchor="middle" font-size="9" fill="#8b94a6">Amazon Bedrock</text>
    <text x="699" y="282" text-anchor="middle" font-size="9" fill="#8b94a6">Claude Sonnet 4.5</text>
  </g>
  <g>
    <rect x="526" y="298" width="228" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="640" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#d6dde8">Apply &amp; Verify</text>
    <text x="640" y="330" text-anchor="middle" font-size="9" fill="#8b94a6">Executes rewrite on PG · confirms row-set identical · flags verdict</text>
  </g>
  <g>
    <rect x="526" y="348" width="228" height="32" rx="6" fill="#0a0f1d" stroke="#1f2838"/>
    <text x="640" y="368" text-anchor="middle" font-size="9.5" fill="#6a7285" letter-spacing="0.04em">Cognito Auth · CloudWatch Logs · WebSocket stream</text>
  </g>

  <!-- =========================================================================
       UI COLUMN
       ========================================================================= -->
  <g filter="url(#card-shadow)">
    <rect x="810" y="110" width="120" height="280" rx="10" fill="#0f1628" stroke="#2a3244" stroke-width="1"/>
    <rect x="810" y="110" width="120" height="3" rx="1.5" fill="url(#headerDash)"/>
  </g>
  <text x="870" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#c4b5fd">Dashboard</text>
  <text x="870" y="150" text-anchor="middle" font-size="9" fill="#6a7285">CloudFront + ALB</text>

  <g>
    <rect x="824" y="164" width="92" height="38" rx="5" fill="#141c34" stroke="#2a3244"/>
    <text x="870" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#5eead4">Live Monitor</text>
    <text x="870" y="194" text-anchor="middle" font-size="8" fill="#8b94a6">Tagged stream</text>
  </g>
  <g>
    <rect x="824" y="210" width="92" height="38" rx="5" fill="#141c34" stroke="#2a3244"/>
    <text x="870" y="227" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">Translate</text>
    <text x="870" y="240" text-anchor="middle" font-size="8" fill="#8b94a6">Oracle → PG</text>
  </g>
  <g>
    <rect x="824" y="256" width="92" height="38" rx="5" fill="#141c34" stroke="#2a3244"/>
    <text x="870" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">Reports</text>
    <text x="870" y="286" text-anchor="middle" font-size="8" fill="#8b94a6">Regressions</text>
  </g>
  <g>
    <rect x="824" y="302" width="92" height="38" rx="5" fill="#141c34" stroke="#2a3244"/>
    <text x="870" y="319" text-anchor="middle" font-size="10" font-weight="600" fill="#fb7185">Admin</text>
    <text x="870" y="332" text-anchor="middle" font-size="8" fill="#8b94a6">Alerts · Audit</text>
  </g>
  <g>
    <rect x="824" y="348" width="92" height="32" rx="5" fill="#0a0f1d" stroke="#1f2838"/>
    <text x="870" y="368" text-anchor="middle" font-size="9" fill="#6a7285">Cloudscape</text>
  </g>

  <!-- =========================================================================
       FLOW ARROWS
       ========================================================================= -->
  <!-- Sources → Oracle -->
  <line x1="194" y1="148" x2="278" y2="175" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowDim)" opacity="0.7"/>
  <!-- Sources → Aurora -->
  <line x1="194" y1="158" x2="278" y2="305" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowDim)" opacity="0.7"/>
  <!-- HammerDB → DBs (dashed) -->
  <line x1="194" y1="240" x2="278" y2="200" stroke="#6a7285" stroke-width="1" marker-end="url(#arrowDim)" stroke-dasharray="3 3"/>
  <line x1="194" y1="250" x2="278" y2="325" stroke="#6a7285" stroke-width="1" marker-end="url(#arrowDim)" stroke-dasharray="3 3"/>

  <!-- Oracle → Engine -->
  <line x1="442" y1="190" x2="508" y2="200" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowOracle)"/>
  <text x="468" y="183" font-size="9" fill="#fbbf24" font-family="'JetBrains Mono', monospace">V$SQL</text>

  <!-- Aurora → Engine -->
  <line x1="442" y1="320" x2="508" y2="260" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowAurora)"/>
  <text x="462" y="305" font-size="9" fill="#60a5fa" font-family="'JetBrains Mono', monospace">pg_stat</text>

  <!-- Engine → UI -->
  <line x1="772" y1="250" x2="808" y2="250" stroke="#5eead4" stroke-width="2" marker-end="url(#arrowMint)"/>
  <text x="790" y="242" text-anchor="middle" font-size="9" fill="#5eead4" font-family="'JetBrains Mono', monospace">WSS</text>

  <!-- =========================================================================
       FOOTER: Supporting services
       ========================================================================= -->
  <g>
    <rect x="32" y="424" width="896" height="88" rx="10" fill="#0c1121" stroke="#1f2838"/>
    <text x="48" y="447" font-size="9" font-weight="700" fill="#6a7285" letter-spacing="0.18em">AWS PLATFORM</text>
  </g>

  <!-- Six service chips -->
  <g>
    <rect x="48" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="117" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">Amazon Bedrock</text>
    <text x="117" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">Claude Sonnet 4.5 · us-profile</text>
  </g>
  <g>
    <rect x="194" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="263" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#5eead4">Amazon RDS</text>
    <text x="263" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">Oracle EE · Aurora PG</text>
  </g>
  <g>
    <rect x="340" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="409" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">Amazon ECS</text>
    <text x="409" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">Fargate · ALB · VPC</text>
  </g>
  <g>
    <rect x="486" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="555" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#fb7185">Amazon Cognito</text>
    <text x="555" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">MFA · @amazon.com</text>
  </g>
  <g>
    <rect x="632" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="701" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">CloudFront</text>
    <text x="701" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">HTTPS · WAF</text>
  </g>
  <g>
    <rect x="778" y="458" width="138" height="42" rx="6" fill="#141c34" stroke="#2a3244"/>
    <text x="847" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#d6dde8">CloudWatch · KMS</text>
    <text x="847" y="490" text-anchor="middle" font-size="8" fill="#8b94a6">Logs · CMK encryption</text>
  </g>

  <!-- Corner build mark -->
  <text x="928" y="528" text-anchor="end" font-size="8" fill="#4a5366" letter-spacing="0.1em" font-family="'JetBrains Mono', monospace">ARCH · V2</text>
</svg>
