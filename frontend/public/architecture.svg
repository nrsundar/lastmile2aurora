<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', 'Amazon Ember', sans-serif">
  <defs>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0" flood-color="#060912" flood-opacity="1"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="headerOracle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="headerAurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="headerEngine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="headerDash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrowAurora" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="arrowOracle" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#fbbf24"/></marker>
    <marker id="arrowMint" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#5eead4"/></marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#6b7685"/></marker>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="680" rx="16" fill="#0a0f1d"/>

  <!-- Title -->
  <text x="40" y="50" font-size="22" font-weight="700" fill="#f4f7fb" letter-spacing="-0.01em">LastMile2Aurora · Architecture</text>
  <text x="40" y="74" font-size="14" fill="#8b94a6" letter-spacing="0.04em">Oracle → Aurora PostgreSQL migration performance watchdog</text>
  <line x1="40" y1="90" x2="1160" y2="90" stroke="#1f2838" stroke-width="1"/>

  <!-- Column labels -->
  <text x="125"  y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#6a7285" letter-spacing="0.2em">SOURCES</text>
  <text x="450"  y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#6a7285" letter-spacing="0.2em">DATABASES</text>
  <text x="800"  y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#6a7285" letter-spacing="0.2em">WATCHDOG ENGINE</text>
  <text x="1088" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#6a7285" letter-spacing="0.2em">UI</text>

  <!-- ================= SOURCES ================= -->
  <g filter="url(#card-shadow)">
    <rect x="40" y="140" width="200" height="100" rx="10" fill="#0f1628" stroke="#2a3244"/>
    <rect x="40" y="140" width="200" height="4" rx="2" fill="url(#headerDash)"/>
  </g>
  <text x="140" y="174" text-anchor="middle" font-size="16" font-weight="600" fill="#f4f7fb">Customer Application</text>
  <text x="140" y="196" text-anchor="middle" font-size="13" fill="#8b94a6">Tagged SQL queries</text>
  <text x="140" y="218" text-anchor="middle" font-size="12" fill="#a78bfa" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">/* tag:order_lookup */</text>

  <g filter="url(#card-shadow)">
    <rect x="40" y="260" width="200" height="94" rx="10" fill="#0f1628" stroke="#2a3244" stroke-dasharray="3 3"/>
    <rect x="40" y="260" width="200" height="4" rx="2" fill="#6a7285"/>
  </g>
  <text x="140" y="292" text-anchor="middle" font-size="16" font-weight="600" fill="#d6dde8">HammerDB <tspan fill="#6a7285" font-size="13" font-weight="400">(demo)</tspan></text>
  <text x="140" y="314" text-anchor="middle" font-size="13" fill="#8b94a6">TPC-C load generator</text>
  <text x="140" y="334" text-anchor="middle" font-size="12" fill="#6a7285">Small / Medium / Large</text>

