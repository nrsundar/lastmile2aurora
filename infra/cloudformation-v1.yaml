AWSTemplateFormatVersion: '2010-09-09'
Description: >
  LastMile2Aurora v1 — Live migration watchdog.
  Epoxy/Orthanc compliant. Owner: raghasun.
  Reusable Cognito pool for shared auth across tools.

Parameters:
  StackVersion:
    Type: String
    Default: v1
    Description: Version tag for resource naming (change on redeploy)
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: Aurora PostgreSQL master password (min 12 chars)
  PGInstanceClass:
    Type: String
    Default: db.t4g.medium
    AllowedValues:
      - db.t4g.medium
      - db.t4g.large
      - db.r6g.large
    Description: Aurora PG instance class (db.t4g.micro not supported)

Resources:

  # ═══════════════════════════════════════════════════════════════════
  # KMS — CMK for all encryption at rest (Epoxy BSC requirement)
  # ═══════════════════════════════════════════════════════════════════
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'rgs-lastmile-${StackVersion} CMK for data encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountRoot
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/rgs-lastmile-${StackVersion}'
      TargetKeyId: !Ref EncryptionKey

  # ═══════════════════════════════════════════════════════════════════
  # VPC — public + private subnets, NAT Gateway
  # ═══════════════════════════════════════════════════════════════════
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.20.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-vpc-${StackVersion}' }
        - { Key: Owner, Value: raghasun }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-igw-${StackVersion}' }
  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # — Public subnets (ALB only) —
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.20.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-pub-a-${StackVersion}' }
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.20.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-pub-b-${StackVersion}' }

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable
  PublicSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # — Private subnets (Fargate + Aurora) —
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.20.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-priv-a-${StackVersion}' }
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.20.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-priv-b-${StackVersion}' }

  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - { Key: Name, Value: !Sub 'rgs-lastmile-nat-${StackVersion}' }

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
  PrivateSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable
  PrivateSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ═══════════════════════════════════════════════════════════════════
  # Security Groups — chained: ALB → ECS → Aurora (Epoxy: no shortcuts)
  # ═══════════════════════════════════════════════════════════════════
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'rgs-lastmile ALB - HTTP/HTTPS from internet'
      GroupName: !Sub 'rgs-lastmile-alb-sg-${StackVersion}'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'rgs-lastmile ECS - from ALB only'
      GroupName: !Sub 'rgs-lastmile-ecs-sg-${StackVersion}'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'rgs-lastmile Aurora - from ECS only'
      GroupName: !Sub 'rgs-lastmile-db-sg-${StackVersion}'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  # ═══════════════════════════════════════════════════════════════════
  # Cognito — User Pool with optional MFA (Epoxy BSC requirement)
  # ═══════════════════════════════════════════════════════════════════
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'rgs-lastmile-users-${StackVersion}'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - { Name: email, Required: true, Mutable: true }
        - { Name: name, Required: false, Mutable: true }
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'rgs-lastmile-spa-${StackVersion}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref CognitoUserPool
      Description: Administrators

  # ═══════════════════════════════════════════════════════════════════
  # Aurora PostgreSQL — private, encrypted, backups (Epoxy compliant)
  # ═══════════════════════════════════════════════════════════════════
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub 'rgs-lastmile private subnets'
      DBSubnetGroupName: !Sub 'rgs-lastmile-dbsng-${StackVersion}'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Sub 'rgs-lastmile-aurora-${StackVersion}'
      Engine: aurora-postgresql
      EngineVersion: '16.6'
      MasterUsername: lastmileadmin
      MasterUserPassword: !Ref DBPassword
      DatabaseName: lastmile
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      StorageEncrypted: true
      KmsKeyId: !Ref EncryptionKey
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - { Key: Owner, Value: raghasun }

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub 'rgs-lastmile-aurora-inst-${StackVersion}'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref PGInstanceClass
      Engine: aurora-postgresql
      PubliclyAccessible: false

  # ═══════════════════════════════════════════════════════════════════
  # S3 — encrypted, versioned, no public access (Epoxy BSC)
  # ═══════════════════════════════════════════════════════════════════
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'rgs-lastmile-data-${AWS::AccountId}-${StackVersion}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !Ref EncryptionKey
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub '${DataBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  # ═══════════════════════════════════════════════════════════════════
  # CloudWatch Logs — 14 day retention for dev (Epoxy)
  # ═══════════════════════════════════════════════════════════════════
  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/rgs-lastmile-${StackVersion}'
      RetentionInDays: 14

  # ═══════════════════════════════════════════════════════════════════
  # ECR — image scanning on push (Epoxy)
  # ═══════════════════════════════════════════════════════════════════
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub 'rgs-lastmile-${StackVersion}'
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey: !GetAtt EncryptionKey.Arn
      Tags:
        - { Key: Owner, Value: raghasun }

  # ═══════════════════════════════════════════════════════════════════
  # ECS Fargate — private subnets, no public IP (Epoxy)
  # ═══════════════════════════════════════════════════════════════════
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'rgs-lastmile-cluster-${StackVersion}'

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'rgs-lastmile-exec-${StackVersion}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: ECRAndLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ecr:GetAuthorizationToken'
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !GetAtt ECSLogGroup.Arn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'rgs-lastmile-task-${StackVersion}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: BedrockAndS3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.*'
                  - !Sub 'arn:aws:bedrock:us-*::foundation-model/anthropic.*'
              - Sid: S3Data
                Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Sid: KMSDecrypt
                Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:GenerateDataKey'
                Resource: !GetAtt EncryptionKey.Arn

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'rgs-lastmile-task-${StackVersion}'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: lastmile-api
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/rgs-lastmile-${StackVersion}:latest'
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - { Name: PG_HOST, Value: !GetAtt AuroraCluster.Endpoint.Address }
            - { Name: PG_PORT, Value: '5432' }
            - { Name: PG_DATABASE, Value: lastmile }
            - { Name: PG_USER, Value: lastmileadmin }
            - { Name: PG_PASSWORD, Value: !Ref DBPassword }
            - { Name: AWS_REGION, Value: !Ref 'AWS::Region' }
            - { Name: COGNITO_USER_POOL_ID, Value: !Ref CognitoUserPool }
            - { Name: COGNITO_CLIENT_ID, Value: !Ref CognitoUserPoolClient }
            - { Name: S3_BUCKET, Value: !Ref DataBucket }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ecs

  # ═══════════════════════════════════════════════════════════════════
  # ALB — internet-facing, HTTP only (HTTPS via Amplify in front)
  # ═══════════════════════════════════════════════════════════════════
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'rgs-lastmile-alb-${StackVersion}'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - { Key: Owner, Value: raghasun }

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'rgs-lastmile-tg-${StackVersion}'
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub 'rgs-lastmile-svc-${StackVersion}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: lastmile-api
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

# ═══════════════════════════════════════════════════════════════════
# Outputs
# ═══════════════════════════════════════════════════════════════════
Outputs:
  APIURL:
    Description: Backend API URL
    Value: !Sub 'http://${ALB.DNSName}'
  AuroraEndpoint:
    Description: Aurora PostgreSQL endpoint (private)
    Value: !GetAtt AuroraCluster.Endpoint.Address
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoUserPoolClient
  S3Bucket:
    Description: Data bucket
    Value: !Ref DataBucket
  ECRRepository:
    Description: ECR repository URI
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/rgs-lastmile-${StackVersion}'
  StackVersion:
    Description: Stack version tag
    Value: !Ref StackVersion
